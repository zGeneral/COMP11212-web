# docker-compose.local.yml — local test of the production Docker build.
#
# Use this when you want to verify the full build (including Pyodide download
# and CodeMirror bundling) on your laptop, without setting up Traefik or DNS.
#
#   docker compose -f docker-compose.local.yml build
#   docker compose -f docker-compose.local.yml up -d
#   open http://localhost:8080
#   docker compose -f docker-compose.local.yml logs -f
#   docker compose -f docker-compose.local.yml down
#
# This intentionally does NOT use the GIT_SHA tag pattern — that's a
# production discipline and would be noisy for one-off local testing.

services:
  while-playground-local:
    build:
      context: .
      args:
        PYODIDE_VERSION: 0.27.0
    image: while-playground:local
    container_name: while-playground-local
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
