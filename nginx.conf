# nginx.conf — config for the while-playground container.
# Replaces the default /etc/nginx/conf.d/default.conf inside nginx:alpine.

# Map for content-type sniffing on .py — we serve while_lang.py as text/x-python.
types {
    text/x-python  py;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression — gzip is fine for js/css/html/wasm.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        text/x-python;

    # Security & cross-origin isolation headers (required for Pyodide's
    # SharedArrayBuffer). Apply to every response.
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # CSP: locked tight for v1.
    # - script-src: own origin + wasm-unsafe-eval (for Pyodide's WASM)
    # - frame-ancestors: * (embed-anywhere is the design intent)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors *;" always;

    # Pyodide bundle: cache forever (immutable, version-pinned).
    # COEP requires CORP on every cross-origin-fetched asset; we serve
    # everything from the same origin so CORP=same-origin is correct.
    location ~ ^/static/pyodide/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }

    # Vendored wheels: same caching policy.
    location ~ ^/static/wheels/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # while_lang.py: long cache; bumps on each container build.
    location = /static/while_lang.py {
        add_header Cache-Control "public, max-age=86400" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        types { text/x-python py; }
        default_type text/x-python;
    }

    # lz-string: small, short-cached.
    location = /static/lz-string.min.js {
        add_header Cache-Control "public, max-age=86400" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # App shell: short cache so updates reach users within minutes.
    location ~ \.(html|js|css)$ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Health check for deploy scripts.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
